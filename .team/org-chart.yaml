# Dev-Team Organizational Structure
#
# This org-chart is for the PLUGIN REPO only.
# In projects, bootstrap-project creates a full org-chart with core agents.
# Specialist agents are added by the Hiring Manager on demand.
#
# Maintained by: hiring-manager (sole writer)
# Readable by: all agents

team:
  name: "Dev Team"
  version: 2
  operator: "operator"
  hiring_manager: "hiring-manager"
  project_manager: "project-manager"

  agents:
    - name: "dev-team"
      role: "Dev-Team Concierge & Enforcer"
      domain: "Project setup, request routing, coordination enforcement"
      reports_to: null
      status: active
      created: "2025-03-18"
      skills:
        - "Project initialization"
        - "Intent detection and routing"
        - "Coordination enforcement"
        - "Audit entry management"

  # Core agents (project-manager, hiring-manager, tech-lead, operator, auditor)
  # are created per-project from templates/ during bootstrap.
  # They appear in each project's .team/org-chart.yaml, not here.

  # Specialist agents (api-engineer, ui-engineer, qa-engineer, security-analyst)
  # are created on-demand by the Hiring Manager from .team/templates/.
  # They appear in each project's .team/org-chart.yaml when created.

  divisions: []
  v_teams: []
