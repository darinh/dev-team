name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest version tag
        id: prev
        run: |
          tag=$(git tag --sort=-v:refname | grep '^v' | head -1 || echo "v0.0.0")
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "Previous tag: $tag"

      - name: Determine bump from commits since last tag
        id: bump
        run: |
          prev_tag="${{ steps.prev.outputs.tag }}"

          # Get commits since last tag (or all commits if no tag)
          if git rev-parse "$prev_tag" >/dev/null 2>&1; then
            commits=$(git log "$prev_tag"..HEAD --format='%s' 2>/dev/null || true)
          else
            commits=$(git log --format='%s')
          fi

          if [ -z "$commits" ]; then
            echo "bump=none" >> "$GITHUB_OUTPUT"
            echo "No new commits since $prev_tag"
            exit 0
          fi

          echo "Commits since $prev_tag:"
          echo "$commits"

          # Determine highest bump type
          bump="none"
          if echo "$commits" | grep -qE '^[a-z]+!(\(.+\))?:' || echo "$commits" | grep -q 'BREAKING CHANGE'; then
            bump="major"
          elif echo "$commits" | grep -qE '^feat(\(.+\))?:'; then
            bump="minor"
          elif echo "$commits" | grep -qE '^(fix|docs|chore|refactor|style|perf|test|ci|build)(\(.+\))?:'; then
            bump="patch"
          fi

          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "Bump type: $bump"

      - name: Bump version
        if: steps.bump.outputs.bump != 'none'
        id: version
        run: |
          bump="${{ steps.bump.outputs.bump }}"
          current=$(python3 -c "import json; print(json.load(open('plugin.json'))['version'])")
          IFS='.' read -r major minor patch <<< "$current"

          case "$bump" in
            major) new="$((major + 1)).0.0" ;;
            minor) new="$major.$((minor + 1)).0" ;;
            patch) new="$major.$minor.$((patch + 1))" ;;
          esac

          python3 -c "
          import json
          d = json.load(open('plugin.json'))
          d['version'] = '$new'
          with open('plugin.json', 'w') as f:
              json.dump(d, f, indent=2)
              f.write('\n')
          "

          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "Version: $current → $new ($bump)"

      - name: Commit and tag
        if: steps.bump.outputs.bump != 'none'
        run: |
          new_version="${{ steps.version.outputs.version }}"
          git config user.name "DevTeam/release"
          git config user.email "release@dev-team.local"
          git add plugin.json
          git commit -m "chore(release): v${new_version}" --allow-empty || true
          git tag "v${new_version}"
          git push origin main --tags
